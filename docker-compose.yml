services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: spk_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    networks:
      - spk_network
    # Port TIDAK di-expose ke publik — hanya internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Flask ML API ───────────────────────────────────────────────────────────
  flask-api:
    build:
      context: ./flask-ml-api
      dockerfile: Dockerfile
    container_name: spk_flask_api
    restart: always
    env_file:
      - ./flask-ml-api/.env
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      FLASK_INTERNAL_TOKEN: ${FLASK_INTERNAL_TOKEN}
    # Port TIDAK di-expose ke publik — hanya internal (diakses laravel-web via docker network)
    networks:
      - spk_network
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Laravel Web (Backend API + Frontend) ──────────────────────────────────
  laravel-web:
    build:
      context: ./laravel-web
      dockerfile: Dockerfile
    container_name: spk_laravel_web
    restart: always
    env_file:
      - ./laravel-web/.env
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      FLASK_API_URL: http://flask-api:5000/api/predict
      FLASK_RETRAIN_URL: http://flask-api:5000/api/retrain
      FLASK_INTERNAL_TOKEN: ${FLASK_INTERNAL_TOKEN}
      # PDF upload config
      PHP_UPLOAD_MAX_FILESIZE: 15M
      PHP_POST_MAX_SIZE: 16M
    # Port TIDAK di-expose langsung ke publik — hanya via nginx
    networks:
      - spk_network
    depends_on:
      db:
        condition: service_healthy
      flask-api:
        condition: service_healthy
    volumes:
      - pdf_uploads:/var/www/html/storage/app/public
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Nginx Reverse Proxy (satu-satunya yang expose port ke publik) ──────────
  nginx:
    image: nginx:alpine
    container_name: spk_nginx
    restart: always
    ports:
      - "${LARAVEL_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - spk_network
    depends_on:
      - laravel-web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  spk_network:
    driver: bridge

volumes:
  db_data:
  ml_models:
  pdf_uploads:
