services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: spk_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    networks:
      - spk_network
    # Port TIDAK di-expose ke publik — hanya internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── PostgreSQL Viewer (pgAdmin) ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: spk_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./infra/db/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - spk_network
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Flask ML API ───────────────────────────────────────────────────────────
  flask-api:
    build:
      context: ./flask-ml-api
      dockerfile: Dockerfile
    container_name: spk_flask_api
    restart: always
    env_file:
      - ./flask-ml-api/.env
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      FLASK_INTERNAL_TOKEN: ${FLASK_INTERNAL_TOKEN}
    # Port TIDAK di-expose ke publik — hanya internal (diakses laravel-web via docker network)
    networks:
      - spk_network
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./flask-ml-api/models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Laravel Web — FrankenPHP (PHP runtime + HTTP server, tanpa Nginx/Apache) ─
  laravel-web:
    build:
      context: ./laravel-web
      dockerfile: Dockerfile
    container_name: spk_laravel_web
    restart: always
    env_file:
      - ./laravel-web/.env
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      FLASK_API_URL: http://flask-api:5000/api/predict
      FLASK_RETRAIN_URL: http://flask-api:5000/api/retrain
      FLASK_INTERNAL_TOKEN: ${FLASK_INTERNAL_TOKEN}
      # FrankenPHP — listen di port 80, tanpa TLS (TLS oleh CDN/load balancer)
      SERVER_NAME: ":80"
    # FrankenPHP mengekspose port langsung ke publik (menggantikan Nginx)
    ports:
      - "${LARAVEL_PORT:-8000}:80"
    networks:
      - spk_network
    depends_on:
      db:
        condition: service_healthy
      flask-api:
        condition: service_healthy
    volumes:
      # Mount source code untuk development (perubahan file langsung terlihat)
      - ./laravel-web:/app
      # Caddyfile config
      - ./laravel-web/Caddyfile:/etc/caddy/Caddyfile
      # Path /app sesuai FrankenPHP WORKDIR
      - pdf_uploads:/app/storage/app/public
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


networks:
  spk_network:
    driver: bridge

volumes:
  db_data:
  pdf_uploads:
  pgadmin_data:
